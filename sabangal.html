<!DOCTYPE html>
<html>
<head>
  <title>Fun Button Example</title>
  <link rel="stylesheet" href="sabangal.css">
  <script>
    function checkAnswer() {
      // Ask the question
      let answer = prompt("Is Zander gay? (yes/no)");

      // Check the response
      if (answer && answer.toLowerCase() === "yes") {
        alert("Result: Boljoon");
      } else {
        alert("bayot ka");
      }
    } 

  </script>
</head>
<body>
  <button onclick="checkAnswer()">Click Me</button>
</body>
</html>
